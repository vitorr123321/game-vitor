<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo de VITOR LINDO GOSTOSO</title>
    <style>
        * { touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { margin: 0; overflow: hidden; background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); position: fixed; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #90EE90 100%); }
        
        .ui { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 32px; font-weight: bold; pointer-events: none; text-shadow: 3px 3px 8px rgba(0,0,0,0.5); background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.1)); padding: 15px 25px; border-radius: 15px; border: 3px solid rgba(255,255,255,0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .controles { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; box-sizing: border-box; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); }
        .btn { width: 90px; height: 90px; background: linear-gradient(135deg, #FF6B6B 0%, #FF4757 50%, #EE5A6F 100%); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; border: 5px solid rgba(255,255,255,0.8); font-size: 35px; pointer-events: auto; box-shadow: 0 15px 35px rgba(255, 107, 107, 0.4), inset 0 -3px 8px rgba(0,0,0,0.3); transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; }
        .btn:active { transform: scale(0.92) translateY(3px); box-shadow: 0 8px 15px rgba(255, 107, 107, 0.3), inset 0 2px 4px rgba(0,0,0,0.4); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(255, 107, 107, 0.5); }
    </style>
</head>
<body>

    <div class="ui">Nível: <span id="lvl">1</span></div>
    <canvas id="jogo"></canvas>

    <div class="controles">
        <div style="display: flex; gap: 20px;">
            <div class="btn" id="btnEsq">◀</div>
            <div class="btn" id="btnDir">▶</div>
        </div>
        <div class="btn" id="btnPulo">↑</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
