<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Batman: Gotham Escape</title>
    <style>
        body { background: #111; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        canvas { background: #000; border: 4px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.7); margin-top: 10px; }
        .hud { width: 800px; display: flex; justify-content: space-between; align-items: center; padding: 15px; font-size: 18px; font-weight: bold; color: gold; text-shadow: 2px 2px 4px black; }
        #coracoes { color: #ff4d4d; font-size: 20px; letter-spacing: 2px; }
        .controles { margin-top: 15px; display: flex; gap: 10px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #222; color: white; border: 2px solid #555; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="hud">
        <div>NÍVEL: <span id="faseAtual">1</span>/10</div>
        <div id="coracoes">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
        <div>PONTOS: <span id="score">0</span></div>
    </div>
    <canvas id="canvasJogo" width="800" height="600"></canvas>
    <div class="controles">
        <button id="btnLeft">⬅️</button>
        <button id="btnAction">PULAR</button>
        <button id="btnRight">➡️</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
